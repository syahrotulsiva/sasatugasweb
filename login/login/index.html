<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form with Background Video</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    
    <!-- Background Video -->
    <video autoplay muted loop id="bg-video">
        <source src="assets/clip.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <!-- Login Form -->
    <div class="login-form">
        <h2>Login</h2>
        
        <!-- Social icons -->
        <div class="social-icons">
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-google"></i>
            <i class="fab fa-twitter"></i>
        </div>
        
        <!-- Username and Password fields -->
        <from action="#" id="loginForm">
            <input type="text" name="username" placeholder="Username" required id="username">
            <input type="password" name="password" placeholder="Password" required id="passwor">
        
        <!-- Login button -->
            <button>Login</button>
            <div id="alertBox" class="alert" style="display:none;"></div>
        </from>
        
        <!-- Register link -->
        <div class="register-form" style="display:none;">
            <h2>Create Account</h2>
            <form action="#" id="registerForm">
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
              
                <button type="submit">Register</button>
            </form>
            
            <p id="message"></p>
            <a href="#" class="register-link">Not Registered? Create Account</a>
        </div>
        
    <script src="js/login.js" defer></script>
    <script src="js/register.js" defer></script>
</body>
</html>
